spring.application.name=Gateway_Service
server.port=8080

user-service.url=${USER_SERVICE_URL:http://localhost:8081}
payment-service.url=${PAYMENT_SERVICE_URL:http://localhost:8082}

spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${user-service.url}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/users,/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=payment-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${payment-service.url}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/payments,/payments/**